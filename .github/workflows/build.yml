name: Build

on:
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2025
    environment: ${{ github.ref_name }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Test cl
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl /?

    - name: Install JOM
      run: |
        curl http://download.qt.io/official_releases/jom/jom.zip -L --output jom.zip
        Expand-Archive -DestinationPath C:\jom jom.zip
        echo C:\jom >> $env:GITHUB_PATH

    - name: JOM Test
      run: |
        dir C:\jom
        echo $env:PATH
        jom /?

    - name: Install QT
      run: |
        curl https://download.qt.io/official_releases/online_installers/qt-online-installer-windows-x64-online.exe -L --output qt-online-installer-windows-x64-online.exe
        $env:QT_INSTALLER_JWT_TOKEN="${{ secrets.QT_INSTALLER_JWT_TOKEN }}"
        .\qt-online-installer-windows-x64-online.exe --root C:\Qt --auto-answer telemetry-question=No --accept-licenses --accept-obligations --confirm-command install qt6-msvc2022-full-dev

        $qt_root = Resolve-Path C:\Qt\*\msvc2022_64
        echo QT_ROOT=$qt_root >> $env:GITHUB_ENV
        echo "$qt_root\bin" >> $env:GITHUB_PATH

    - name: QT Test
      run: |
        echo $env:QT_ROOT
        qmake --help
        
    - name: Generate
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        qmake
    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        jom

    - name: Create Distribution
      run: |
        mkdir dist
        copy kernel.cl dist
        copy release\*.exe dist
        copy libraries\Windows\*.dll dist
        windeployqt dist\IntanRHX.exe
  
    - name: Upload Distribution
      uses: actions/upload-artifact@v4
      with:
        name: windows-dist
        path: dist
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    environment: ${{ github.ref_name }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install deps
      run: |
        sudo apt -y update
        sudo apt -y install libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
                            libxcb-shape0 libxcb-util1 libxcb-xinput0 libxcb-xkb1 libxkbcommon-x11-0

    - name: Install QT
      run: |
        curl https://download.qt.io/official_releases/online_installers/qt-online-installer-linux-x64-online.run -L --output qt-online-installer-linux-x64-online.run
        export QT_INSTALLER_JWT_TOKEN="${{ secrets.QT_INSTALLER_JWT_TOKEN }}"
        chmod +x qt-online-installer-linux-x64-online.run
        ./qt-online-installer-linux-x64-online.run --root $HOME/qt --auto-answer telemetry-question=No --accept-licenses --accept-obligations --confirm-command install qt6-full-dev

        qt_root=`ls -d $HOME/qt/*/gcc_64`
        echo QT_ROOT=$qt_root >> $GITHUB_ENV
        echo "$qt_root/bin" >> $GITHUB_PATH

    - name: QT Test
      run: |
        echo $QT_ROOT
        which qmake
        qmake --help
        
    - name: Generate
      run: qmake
    - name: Build
      run: make

    - name: Create Distribution
      run: |
        mkdir dist
        cp kernel.cl dist
        cp release/IntanRHX dist
        cp libraries/Linux/* dist
  
    - name: Upload Distribution
      uses: actions/upload-artifact@v4
      with:
        name: linux-dist
        path: dist
